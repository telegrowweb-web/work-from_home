<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work From Home Opportunity</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: radial-gradient(circle at top right, #1a1a1a, #000);
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            text-align: center;
            padding: 20px;
        }

        /* Glassmorphism Container */
        .container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            padding: 40px 30px;
            border-radius: 24px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin-bottom: 20px;
            object-fit: cover;
            border: 2px solid #d4af37; /* Gold border */
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #fff, #d4af37);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 15px;
            color: #ccc;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        /* Premium CTA Button */
        .btn-whatsapp {
            display: inline-block;
            background: linear-gradient(135deg, #d4af37 0%, #b8860b 100%);
            color: #000;
            text-decoration: none;
            padding: 16px 40px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 18px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2);
            width: 100%;
        }

        .btn-whatsapp:hover {
            transform: scale(1.03);
            box-shadow: 0 15px 25px rgba(212, 175, 55, 0.4);
        }

        /* Footer Style */
        .footer {
            position: absolute;
            bottom: 30px;
            width: 100%;
        }

        .footer-pill {
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(255,255,255,0.05);
            padding: 8px 15px;
            border-radius: 30px;
            transition: 0.3s;
        }

        .ft2 {
            color: #888;
            font-size: 12px;
        }

        .footer-pill:hover {
            background: rgba(255,255,255,0.1);
        }

        /* Mobile Adjustments */
        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }
            h1 { font-size: 24px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://academylinkx.site/wp-content/uploads/2026/03/a-professional-logo-design-featuring-the_MAzJyQyRSKS8U0adzmrMVA_0dqVqgMPSpWz84PUomy5EA_cover_sd-1.jpeg" alt="Logo" class="logo">
        
        <h1>Join Our Team</h1>
        <p>Start your professional journey with our exclusive work-from-home opportunities. Simple tasks, great growth.</p>
        
        <a href="https://wa.me/message/Y34XAGOLDWSUK1" class="btn-whatsapp">
            Connect on WhatsApp
        </a>
    </div>

    <div class="footer">
        <a class="footer-pill" href="https://telegram.me/+TRlJl628l-FkMWE9" target="_blank">
            <span class="ft2">Ads Managed by</span>
            <span style="color:rgba(0,198,255,.55);font-weight:500;font-size:12px">@Nexgroww_agency</span>
        </a>
    </div>

</body>
</html>
