<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Work From Home Opportunity</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #000;
            height: 100vh;
            height: 100dvh; /* Dynamic viewport height for mobile */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: #fff;
            position: relative;
        }

        /* Animated Premium Background */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(212, 175, 55, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 198, 255, 0.1) 0%, transparent 40%);
            z-index: -1;
            animation: pulseBg 8s infinite alternate;
        }

        @keyframes pulseBg {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }

        .container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 35px 25px;
            border-radius: 30px;
            max-width: 400px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 45px rgba(0,0,0,0.6);
            text-align: center;
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            margin-bottom: 20px;
            object-fit: cover;
            border: 2.5px solid #d4af37;
            padding: 3px;
            background: #000;
        }

        .badge {
            display: inline-block;
            background: rgba(212, 175, 55, 0.15);
            color: #d4af37;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 30px;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 12px;
            background: linear-gradient(to bottom, #fff 60%, #d4af37);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .features {
            list-style: none;
            margin-bottom: 25px;
        }

        .features li {
            font-size: 14px;
            color: #aaa;
            margin: 8px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .features li::before {
            content: "✓";
            color: #d4af37;
            font-weight: bold;
        }

        .btn-whatsapp {
            display: block;
            background: linear-gradient(135deg, #d4af37 0%, #f1c40f 100%);
            color: #000;
            text-decoration: none;
            padding: 16px;
            border-radius: 15px;
            font-weight: 700;
            font-size: 17px;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3);
        }

        .btn-whatsapp:active {
            transform: scale(0.96);
        }

        /* Footer Fixed at Bottom */
        .footer {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
        }

        .footer-pill {
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255,255,255,0.05);
            padding: 10px 18px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .ft2 { color: #888; font-size: 11px; font-weight: 400; }

        @media (max-height: 650px) {
            .container { padding: 25px 20px; }
            h1 { font-size: 24px; }
            .logo { width: 70px; height: 70px; }
            .features { margin-bottom: 15px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="badge">Hiring Now</div>
        
        <img src="https://academylinkx.site/wp-content/uploads/2026/03/a-professional-logo-design-featuring-the_MAzJyQyRSKS8U0adzmrMVA_0dqVqgMPSpWz84PUomy5EA_cover_sd-1.jpeg" alt="Logo" class="logo">
        
        <h1>Earn From Home Online</h1>
        
        <ul class="features">
            <li>No Investment Required</li>
            <li>Daily Payout Guaranteed</li>
            <li>Mobile Se Kaam Karein</li>
        </ul>
        
        <a href="https://wa.me/message/Y34XAGOLDWSUK1" class="btn-whatsapp">
            Start Earning Now
        </a>
    </div>

    <div class="footer">
        <a class="footer-pill" href="https://telegram.me/+TRlJl628l-FkMWE9" target="_blank">
            <span class="ft2">Ads Managed by</span>
            <span style="color:rgba(0,198,255,.55);font-weight:600;font-size:12px">@Nexgroww_agency</span>
        </a>
    </div>

</body>
</html>
